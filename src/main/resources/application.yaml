spring:
  application:
    name: store-core
  jackson:
    property-naming-strategy: SNAKE_CASE
    threads:
      virtual:
        enabled: true
    
  datasource:
    url: jdbc:postgresql://store-core-db:5432/storecoredb
    username: postgres
    password: 1
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    url: jdbc:postgresql://store-core-db:5432/storecoredb
    user: postgres
    password: 1

  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      enable.idempotence: true
      max.in.flight.requests.per.connection: 5
    consumer:
      group-id: store-core-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.github.storecore.dto.events
        spring.json.use.type.headers: false

  elasticsearch:
    uris: elasticsearch:9200

  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 51730

logging:
  level:
    root: INFO

app:
  cleanup:
    cron: 0 0 0 * * ?
    timezone: CET
  activation-ttl-minutes: 15
  inactive-account-ttl-days: 1
  kafka:
    replicas: 3
    min-insync-replicas: 2

minio:
  url: http://minio:9000
  access-key: 123456789qwerty123456789qwerty123456789qwerty
  secret-key: 123456789qwerty123456789qwerty123456789qwerty
  bucket:
    default: default-bucket
    persons: persons-bucket
    products: products-bucket

kafka:
  topic:
    report: report-topic
    review: review-topic
    registration: registration-topic
    registration-compensate: registration-compensate-topic


api:
  service:
    notification-reports: http://notification-service:51740/api/notifications
    store-authentication:
      base-url: http://store-authentication:51720/api/v1/users
      validate: /is-email-available

resilience4j:
  circuitbreaker:
    instances:
      default:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 5s
        failure-rate-threshold: 50
        event-consumer-buffer-size: 10

max:
  photo:
    per:
      product: 5